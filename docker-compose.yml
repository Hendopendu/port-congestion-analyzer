version: '3.8'
services:
  jupyter:
    build: .
    ports:
      - "8888:8888"
    volumes:
      - .:/app
    env_file:
      - .env
    command: jupyter lab --ip=0.0.0.0 --allow-root --NotebookApp.token=''

  dashboard:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    env_file:
      - .env
    command: streamlit run src/dashboard.py